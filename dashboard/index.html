<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawRoyale - Live Tactical Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-2 text-slate-300">

    <div class="max-w-6xl mx-auto space-y-2">
        <!-- HEADER BAR -->
        <div class="bg-slate-900 border border-slate-800 p-2 rounded flex justify-between items-center shadow-lg glow-indigo">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 p-1.5 rounded"><i class="fa-solid fa-brain text-white text-xs"></i></div>
                <h1 class="font-black text-slate-100 tracking-tighter uppercase text-[10px]">Tactical Telemetry</h1>
                <span id="turn-num" class="bg-indigo-950 text-indigo-400 px-2 py-0.5 rounded font-black border border-indigo-800 text-[11px]">T-00</span>
            </div>
            <div class="flex items-center space-x-2">
                <div id="status-box" class="bg-slate-950 px-2 py-0.5 rounded border border-slate-800 text-[9px] font-bold text-red-500 uppercase">
                    OFFLINE
                </div>
                <button onclick="copyAuditLog()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1 rounded-sm text-[9px] font-bold transition-all shadow-md">
                    <i class="fa-solid fa-copy mr-1"></i> COPY FULL AUDIT LOG
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-2 text-[10px]">
            <!-- VITAL STATS -->
            <div class="bg-slate-900 border border-slate-800 p-2 rounded space-y-2">
                <div class="flex justify-between font-bold text-rose-400"><span>HEALTH</span> <span id="hp-text">100/100</span></div>
                <div class="w-full bg-black h-1 rounded-full overflow-hidden border border-slate-800">
                    <div id="hp-bar" class="bg-emerald-500 h-full w-full transition-all"></div>
                </div>
                <div class="flex justify-between font-bold text-cyan-400"><span>ENERGY</span> <span id="ep-text">10/10</span></div>
                <div class="w-full bg-black h-1 rounded-full overflow-hidden border border-slate-800">
                    <div id="ep-bar" class="bg-blue-500 h-full w-full transition-all"></div>
                </div>
                <div class="grid grid-cols-2 gap-1 text-center pt-1 border-t border-slate-800">
                    <div class="bg-black/30 p-1 rounded"><div class="text-slate-500 uppercase text-[8px]">Defense</div><div class="font-black text-blue-400 text-xs" id="stat-def">0</div></div>
                    <div class="bg-black/30 p-1 rounded"><div class="text-slate-500 uppercase text-[8px]">Kills</div><div class="font-black text-rose-500 text-xs" id="stat-kills">0</div></div>
                </div>
            </div>

            <!-- AI DECISION & LOCATION -->
            <div class="md:col-span-2 bg-slate-900 border border-slate-800 p-2 rounded flex flex-col justify-between glow-emerald">
                <div class="flex justify-between items-start">
                    <div class="space-y-1">
                        <div class="text-emerald-400 font-black text-xs uppercase" id="location-name">Waiting...</div>
                        <div id="badai-status" class="text-[8px] font-black px-1.5 py-0.5 rounded bg-black/50 text-slate-500 border border-slate-800 inline-block">STORM: N/A</div>
                    </div>
                    <div class="text-right">
                        <div class="text-indigo-400 font-black text-[10px]" id="decision-header">NONE</div>
                        <div id="cooldown-status" class="text-[8px] font-bold text-amber-500 uppercase">Syncing...</div>
                    </div>
                </div>
                <div class="mt-2 p-1.5 bg-black/40 rounded border border-slate-800/50">
                    <div class="text-slate-500 font-bold uppercase text-[7px] mb-1">Reasoning Pattern:</div>
                    <div id="decision-detail" class="italic text-slate-300 font-serif leading-tight text-[10px]">Initializing brain...</div>
                </div>
            </div>

            <!-- MINI INVENTORY -->
            <div class="bg-slate-900 border border-slate-800 p-2 rounded flex flex-col h-24">
                <div class="text-[8px] font-bold text-slate-500 uppercase border-b border-slate-800 pb-1 mb-1">Inventory & Loot</div>
                <div class="overflow-y-auto flex-1 scroll-bar pr-1">
                    <ul id="bag-items" class="space-y-0.5 text-slate-400"></ul>
                    <hr class="border-slate-800 my-1">
                    <ul id="ground-items" class="space-y-0.5 text-amber-500"></ul>
                </div>
            </div>
        </div>

        <!-- LARGE AUDIT TABLE -->
        <div class="bg-slate-900 border border-slate-800 rounded flex flex-col h-80 shadow-2xl overflow-hidden">
            <div class="p-1.5 border-b border-slate-800 bg-slate-950/50 flex justify-between items-center px-3 text-[9px]">
                <span class="font-bold text-indigo-400 uppercase tracking-widest"><i class="fa-solid fa-list-ul mr-1"></i> Tactical Reasoning Log</span>
                <span id="game-id-text" class="text-slate-600 font-mono">ID: N/A</span>
            </div>
            <div class="overflow-y-auto flex-1 bg-black/20 scroll-bar">
                <table class="w-full text-left">
                    <thead class="bg-slate-900/80 sticky top-0 text-slate-500 text-[8px] uppercase tracking-tighter border-b border-slate-800">
                        <tr>
                            <th class="p-2 w-10">Turn</th>
                            <th class="p-2 w-16">Mode</th>
                            <th class="p-2 w-20 text-center">Action</th>
                            <th class="p-2">Detailed AI Reasoning (Thoughts)</th>
                            <th class="p-2 w-28">Physical State</th>
                        </tr>
                    </thead>
                    <tbody id="audit-log-body" class="font-mono text-[9px] divide-y divide-slate-800/30"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
